<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Nova | Professional Image Editor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=M+PLUS+Rounded+1c:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #0a0a0b;
      --sidebar-bg: rgba(20, 20, 22, 0.8);
      --accent: #00d2ff;
      --accent-dark: #3a7bd5;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e0e0e0;
      --text-dim: #888;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    * { box-sizing: border-box; outline: none; }
    body, html {
      margin: 0; padding: 0; height: 100vh; width: 100vw;
      background-color: var(--bg-main); color: var(--text);
      font-family: 'Inter', 'Noto Sans JP', sans-serif; overflow: hidden;
    }

    /* --- レイアウト構成 --- */
    .app-container {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: 50px 1fr 30px;
      height: 100vh;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 上部バー */
    header {
      grid-column: 1 / 4;
      background: var(--sidebar-bg);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 20px;
      z-index: 100;
    }

    .brand { font-weight: 800; letter-spacing: 1px; color: var(--accent); font-size: 1.2rem; }

    /* 左ツールバー */
    .sidebar-left {
      width: 70px; background: var(--sidebar-bg); backdrop-filter: blur(15px);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      align-items: center; padding: 15px 0; gap: 10px; z-index: 90;
      transition: transform 0.4s ease;
    }

    /* 右プロパティ・レイヤーパネル */
    .sidebar-right {
      width: 300px; background: var(--sidebar-bg); backdrop-filter: blur(15px);
      border-left: 1px solid var(--border); display: flex; flex-direction: column;
      z-index: 90; transition: transform 0.4s ease; overflow-y: auto;
    }

    /* 中央キャンバス */
    main {
      background: #111; position: relative; display: flex;
      justify-content: center; align-items: center; overflow: auto;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* 下部ステータス */
    footer {
      grid-column: 1 / 4; background: var(--sidebar-bg); border-top: 1px solid var(--border);
      font-size: 0.75rem; display: flex; align-items: center; padding: 0 20px; color: var(--text-dim);
    }

    /* --- コンポーネント --- */
    .tool-btn {
      width: 44px; height: 44px; border-radius: 10px; border: 1px solid transparent;
      background: var(--glass); color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      transition: all 0.2s;
    }
    .tool-btn:hover { background: var(--glass-hover); border-color: var(--accent); }
    .tool-btn.active { background: var(--accent); color: #000; }

    .panel-section { padding: 20px; border-bottom: 1px solid var(--border); }
    .panel-title { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; }

    input, select, button.action-btn {
      width: 100%; background: var(--glass); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px; color: var(--text); font-size: 0.85rem;
      margin-bottom: 10px; transition: 0.2s;
    }
    input:focus { border-color: var(--accent); background: var(--glass-hover); }
    button.action-btn { cursor: pointer; font-weight: 600; text-align: center; border: none; }
    button.action-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #000; }
    button.action-btn.primary:hover { opacity: 0.9; transform: translateY(-1px); }

    /* レイヤーリスト */
    #layer-list { list-style: none; padding: 0; margin: 0; }
    .layer-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      background: var(--glass); border-radius: 8px; margin-bottom: 5px;
      cursor: pointer; border: 1px solid transparent; transition: 0.2s;
    }
    .layer-item:hover { background: var(--glass-hover); }
    .layer-item.active { border-color: var(--accent); background: rgba(0, 210, 255, 0.1); }
    .layer-thumb { width: 30px; height: 30px; background: #333; border-radius: 4px; object-fit: cover; }
    .layer-name { flex-grow: 1; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* UI非表示用クラス */
    .ui-hidden .sidebar-left { transform: translateX(-100%); }
    .ui-hidden .sidebar-right { transform: translateX(100%); }
    .ui-hidden { grid-template-columns: 0px 1fr 0px; }

    .canvas-container { box-shadow: var(--shadow); }

    /* スライダー */
    .control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .control-row label { width: 80px; font-size: 0.75rem; color: var(--text-dim); }
    input[type="range"] { -webkit-appearance: none; background: var(--border); height: 4px; border-radius: 2px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }
  </style>
</head>
<body>

  <div class="app-container" id="app-shell">
    <header>
      <div class="brand">STUDIO NOVA</div>
      <button class="tool-btn" id="toggle-ui" title="UI表示切替">👁️</button>
      <div style="margin-left: 10px; display: flex; gap: 10px;">
        <button class="tool-btn" id="undo">↩️</button>
        <button class="tool-btn" id="redo">↪️</button>
      </div>
      
      <div style="margin-left: auto; display: flex; gap: 15px; align-items: center;">
        <div class="control-row" style="margin-bottom: 0;">
          <label>W</label><input type="number" id="cv-width" value="800" style="width: 70px; margin: 0;">
          <label style="width: auto;">H</label><input type="number" id="cv-height" value="600" style="width: 70px; margin: 0;">
          <button class="action-btn" id="resize-canvas" style="width: auto; margin: 0; padding: 8px 15px;">適用</button>
        </div>
        <button class="action-btn primary" id="export-btn" style="width: 120px; margin: 0;">保存 (PNG)</button>
      </div>
    </header>

    <nav class="sidebar-left">
      <button class="tool-btn active" id="tool-select" title="選択">🖱️</button>
      <button class="tool-btn" id="tool-draw" title="ペン">✏️</button>
      <button class="tool-btn" id="add-text" title="テキスト">T</button>
      <button class="tool-btn" id="add-rect" title="矩形">⬜</button>
      <button class="tool-btn" id="add-circle" title="円">⭕</button>
      <label for="img-upload" class="tool-btn" style="cursor: pointer;">🖼️</label>
      <input type="file" id="img-upload" hidden accept="image/*">
      <div style="margin-top: auto;">
        <button class="tool-btn danger" id="delete-obj" title="削除">🗑️</button>
      </div>
    </nav>

    <main id="main-viewport">
      <canvas id="c"></canvas>
    </main>

    <aside class="sidebar-right">
      <div class="panel-section">
        <div class="panel-title">変形・配置</div>
        <div class="btn-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
          <button class="tool-btn" onclick="align('left')">左</button>
          <button class="tool-btn" onclick="align('center')">中</button>
          <button class="tool-btn" onclick="align('right')">右</button>
        </div>
      </div>

      <div class="panel-section" id="text-props" style="display: none;">
        <div class="panel-title">テキスト設定</div>
        <select id="font-family">
          <option value="Inter">Inter</option>
          <option value="Noto Sans JP">Noto Sans JP</option>
          <option value="M PLUS Rounded 1c">M PLUS Rounded 1c</option>
          <option value="serif">明朝体</option>
          <option value="monospace">等幅フォント</option>
        </select>
        <div class="control-row">
          <label>フォント追加</label>
          <input type="file" id="font-upload" accept=".ttf,.otf,.woff">
        </div>
        <div class="control-row">
          <label>サイズ</label>
          <input type="range" id="font-size" min="10" max="200" value="40">
        </div>
        <div class="control-row">
          <label>カラー</label>
          <input type="color" id="text-color" value="#ffffff">
        </div>
      </div>

      <div class="panel-section" id="image-props" style="display: none;">
        <div class="panel-title">画像フィルター</div>
        <div class="control-row"><label>明るさ</label><input type="range" class="f-slider" data-filter="Brightness" min="-1" max="1" step="0.01" value="0"></div>
        <div class="control-row"><label>コントラスト</label><input type="range" class="f-slider" data-filter="Contrast" min="-1" max="1" step="0.01" value="0"></div>
        <div class="control-row"><label>彩度</label><input type="range" class="f-slider" data-filter="Saturation" min="-1" max="1" step="0.01" value="0"></div>
        <button class="action-btn" id="btn-remove-bg">背景削除 (色指定)</button>
      </div>

      <div class="panel-section" style="flex-grow: 1;">
        <div class="panel-title">レイヤーマネージャー</div>
        <ul id="layer-list">
          </ul>
      </div>
    </aside>

    <footer>
      <span>Objects: <span id="obj-count">0</span></span>
      <span style="margin-left: 20px;">Canvas: <span id="zoom-level">100%</span></span>
    </footer>
  </div>

  <script>
    // --- 初期化 ---
    const canvas = new fabric.Canvas('c', {
      width: 800,
      height: 600,
      backgroundColor: '#ffffff',
      preserveObjectStacking: true
    });

    const layerList = document.getElementById('layer-list');
    const appShell = document.getElementById('app-shell');

    // --- 履歴管理 ---
    let history = [];
    let historyIdx = -1;

    function saveState() {
      if (historyIdx < history.length - 1) history = history.slice(0, historyIdx + 1);
      history.push(JSON.stringify(canvas));
      historyIdx++;
      updateLayerList();
      document.getElementById('obj-count').innerText = canvas.getObjects().length;
    }

    // --- UI操作 ---
    document.getElementById('toggle-ui').onclick = () => appShell.classList.toggle('ui-hidden');

    document.getElementById('resize-canvas').onclick = () => {
      const w = parseInt(document.getElementById('cv-width').value);
      const h = parseInt(document.getElementById('cv-height').value);
      canvas.setDimensions({ width: w, height: h });
      saveState();
    };

    // --- レイヤー一覧の更新 ---
    function updateLayerList() {
      layerList.innerHTML = '';
      const objects = canvas.getObjects().slice().reverse(); // 背面が下、前面が上
      objects.forEach((obj, idx) => {
        const li = document.createElement('li');
        li.className = `layer-item ${obj === canvas.getActiveObject() ? 'active' : ''}`;
        
        let icon = '🔹';
        if (obj.type === 'i-text') icon = '文字';
        if (obj.type === 'image') icon = '画像';
        
        li.innerHTML = `
          <span class="layer-name">${icon}: ${obj.type} (${objects.length - idx})</span>
          <button onclick="toggleLock(${objects.length - 1 - idx})" style="background:none;border:none;cursor:pointer;">${obj.selectable ? '🔓' : '🔒'}</button>
          <button onclick="toggleVisibility(${objects.length - 1 - idx})" style="background:none;border:none;cursor:pointer;">${obj.visible ? '👁️' : '🕶️'}</button>
        `;
        li.onclick = () => {
          canvas.setActiveObject(obj);
          canvas.renderAll();
        };
        layerList.appendChild(li);
      });
    }

    window.toggleVisibility = (idx) => {
      const obj = canvas.item(idx);
      obj.set('visible', !obj.visible);
      canvas.renderAll();
      updateLayerList();
    };

    window.toggleLock = (idx) => {
      const obj = canvas.item(idx);
      obj.set('selectable', !obj.selectable);
      obj.set('evented', obj.selectable);
      canvas.renderAll();
      updateLayerList();
    };

    // --- オブジェクト追加系 ---
    document.getElementById('add-text').onclick = () => {
      const txt = new fabric.IText('Double Click to Edit', {
        left: 100, top: 100, fontFamily: 'Inter', fill: '#000000'
      });
      canvas.add(txt).setActiveObject(txt);
      saveState();
    };

    document.getElementById('add-rect').onclick = () => {
      canvas.add(new fabric.Rect({ width: 100, height: 100, fill: '#00d2ff', left: 50, top: 50 }));
      saveState();
    };

    document.getElementById('add-circle').onclick = () => {
      canvas.add(new fabric.Circle({ radius: 50, fill: '#3a7bd5', left: 100, top: 100 }));
      saveState();
    };

    document.getElementById('img-upload').onchange = (e) => {
      const reader = new FileReader();
      reader.onload = (f) => {
        fabric.Image.fromURL(f.target.result, (img) => {
          img.scaleToWidth(300);
          canvas.add(img).centerObject(img).setActiveObject(img);
          saveState();
        });
      };
      reader.readAsDataURL(e.target.files[0]);
    };

    // --- フォントアップロード ---
    document.getElementById('font-upload').onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = async (f) => {
        const fontName = file.name.split('.')[0];
        const fontFace = new FontFace(fontName, f.target.result);
        await fontFace.load();
        document.fonts.add(fontFace);
        
        const option = document.createElement('option');
        option.value = fontName;
        option.innerText = fontName;
        document.getElementById('font-family').appendChild(option);
        alert(`フォント "${fontName}" を読み込みました`);
      };
      reader.readAsArrayBuffer(file);
    };

    // --- フィルター適用 ---
    document.querySelectorAll('.f-slider').forEach(slider => {
      slider.oninput = function() {
        const obj = canvas.getActiveObject();
        if (!obj || obj.type !== 'image') return;
        
        const type = this.dataset.filter;
        let filter = obj.filters.find(f => f && f.type === type);
        
        const val = parseFloat(this.value);
        if (!filter) {
          if (type === 'Brightness') filter = new fabric.Image.filters.Brightness({ brightness: val });
          if (type === 'Contrast') filter = new fabric.Image.filters.Contrast({ contrast: val });
          if (type === 'Saturation') filter = new fabric.Image.filters.Saturation({ saturation: val });
          obj.filters.push(filter);
        } else {
          if (type === 'Brightness') filter.brightness = val;
          if (type === 'Contrast') filter.contrast = val;
          if (type === 'Saturation') filter.saturation = val;
        }
        obj.applyFilters();
        canvas.renderAll();
      };
    });

    // --- イベントリスナー ---
    canvas.on('selection:created', updatePropsPanel);
    canvas.on('selection:updated', updatePropsPanel);
    canvas.on('selection:cleared', () => {
      document.getElementById('text-props').style.display = 'none';
      document.getElementById('image-props').style.display = 'none';
      updateLayerList();
    });

    function updatePropsPanel() {
      const obj = canvas.getActiveObject();
      updateLayerList();
      if (!obj) return;

      if (obj.type === 'i-text') {
        document.getElementById('text-props').style.display = 'block';
        document.getElementById('image-props').style.display = 'none';
        document.getElementById('font-family').value = obj.fontFamily;
        document.getElementById('font-size').value = obj.fontSize;
      } else if (obj.type === 'image') {
        document.getElementById('text-props').style.display = 'none';
        document.getElementById('image-props').style.display = 'block';
      } else {
        document.getElementById('text-props').style.display = 'none';
        document.getElementById('image-props').style.display = 'none';
      }
    }

    document.getElementById('font-family').onchange = function() {
      const obj = canvas.getActiveObject();
      if (obj && obj.type === 'i-text') {
        obj.set('fontFamily', this.value);
        canvas.renderAll();
        saveState();
      }
    };

    document.getElementById('font-size').oninput = function() {
      const obj = canvas.getActiveObject();
      if (obj && obj.type === 'i-text') {
        obj.set('fontSize', parseInt(this.value));
        canvas.renderAll();
      }
    };

    // --- ツール切替 ---
    document.getElementById('tool-draw').onclick = function() {
      canvas.isDrawingMode = !canvas.isDrawingMode;
      this.classList.toggle('active', canvas.isDrawingMode);
      document.getElementById('tool-select').classList.toggle('active', !canvas.isDrawingMode);
    };
    document.getElementById('tool-select').onclick = function() {
      canvas.isDrawingMode = false;
      this.classList.add('active');
      document.getElementById('tool-draw').classList.remove('active');
    };

    document.getElementById('delete-obj').onclick = () => {
      canvas.getActiveObjects().forEach(o => canvas.remove(o));
      canvas.discardActiveObject();
      saveState();
    };

    // --- エクスポート ---
    document.getElementById('export-btn').onclick = () => {
      const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
      const link = document.createElement('a');
      link.download = 'nova-export.png';
      link.href = dataURL;
      link.click();
    };

    // ショートカットキー (Delete)
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (canvas.getActiveObject() && !canvas.getActiveObject().isEditing) {
          canvas.getActiveObjects().forEach(o => canvas.remove(o));
          canvas.discardActiveObject();
          saveState();
        }
      }
    });

    // 初期状態保存
    canvas.on('object:modified', saveState);
    canvas.on('object:added', () => { if(canvas._objects.length > 0) updateLayerList(); });
    setTimeout(saveState, 500);

  </script>
</body>
</html>
